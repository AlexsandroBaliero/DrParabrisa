<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. Para-Brisas | Vidros Automotivos</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0b1a35; --blue: #1a3a72; --red: #c8151b; --gold: #f5c518; --white: #ffffff; --light: #e8f0ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background-color: var(--navy); color: var(--white); overflow-x: hidden; }

    .hero {
      position: relative; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem 1.5rem 4rem; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(26,58,114,0.7) 0%, transparent 70%),
                  radial-gradient(ellipse 60% 40% at 80% 80%, rgba(200,21,27,0.25) 0%, transparent 60%);
      z-index: 0;
    }
    .beams { position: absolute; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
    .beam {
      position: absolute; bottom: -20%; width: 3px; height: 80%;
      background: linear-gradient(to top, rgba(245,197,24,0.6), transparent);
      border-radius: 2px; transform-origin: bottom center;
      animation: sweep 4s ease-in-out infinite alternate;
    }
    .beam:nth-child(1) { left: 30%; animation-delay: 0s; }
    .beam:nth-child(2) { left: 70%; animation-delay: 0.6s; }
    @keyframes sweep {
      from { opacity: 0.3; transform: rotate(-12deg) scaleY(0.8); }
      to   { opacity: 0.7; transform: rotate(12deg) scaleY(1.1); }
    }
    .hero-content { position: relative; z-index: 1; }
    .logo-wrap { width: min(280px, 65vw); margin: 0 auto 1.5rem; animation: dropIn 0.8s cubic-bezier(0.22,1,0.36,1) both; }
    .logo-wrap img { width: 100%; border-radius: 50%; }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-40px) scale(0.85); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 12vw, 7rem);
      letter-spacing: 4px; line-height: 0.95; color: var(--white);
      text-shadow: 0 0 40px rgba(245,197,24,0.4); animation: fadeUp 0.9s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    .hero h1 span { color: var(--gold); }
    .hero-sub {
      font-size: clamp(0.9rem, 3vw, 1.15rem); font-weight: 700; color: var(--light);
      letter-spacing: 3px; text-transform: uppercase; margin: 0.8rem 0 2.5rem;
      animation: fadeUp 0.9s 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: linear-gradient(135deg, #25d366, #128c4d); color: #fff;
      font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 800;
      text-decoration: none; padding: 1rem 2.2rem; border-radius: 50px;
      box-shadow: 0 8px 30px rgba(37,211,102,0.4); transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.9s 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    .cta-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 14px 40px rgba(37,211,102,0.55); }
    .cta-btn svg { width: 22px; height: 22px; fill: #fff; }

    .wave { display: block; width: 100%; line-height: 0; }
    .wave svg { display: block; width: 100%; }

    .services { background: #fff; color: var(--navy); padding: 5rem 1.5rem 4rem; text-align: center; }
    .section-label { font-size: 0.8rem; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; color: var(--red); margin-bottom: 0.5rem; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.2rem, 7vw, 4rem); letter-spacing: 2px; color: var(--navy); margin-bottom: 3rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; max-width: 1000px; margin: 0 auto; }
    .card {
      background: var(--navy); color: var(--white); border-radius: 20px; padding: 2rem 1.5rem;
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
      box-shadow: 0 10px 40px rgba(11,26,53,0.18); transition: transform 0.25s, box-shadow 0.25s;
      position: relative; overflow: hidden;
    }
    .card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--gold), var(--red)); }
    .card:hover { transform: translateY(-6px); box-shadow: 0 18px 50px rgba(11,26,53,0.28); }
    .card-icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--blue), var(--navy)); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; letter-spacing: 1px; text-align: center; }
    .card p { font-size: 0.88rem; color: var(--light); line-height: 1.6; text-align: center; }

    .gallery { background: var(--navy); padding: 5rem 1.5rem; text-align: center; }
    .gallery .section-title { color: var(--white); }
    .gallery .section-label { color: var(--gold); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; max-width: 1100px; margin: 0 auto; }
    .gallery-item { border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.4); transition: transform 0.3s; }
    .gallery-item:hover { transform: translateY(-6px); }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .ba-wrap {
      position: relative; overflow: hidden; border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4); cursor: ew-resize; user-select: none; aspect-ratio: 3/4;
    }
    .ba-wrap img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .ba-after { clip-path: inset(0 50% 0 0); }
    .ba-divider { position: absolute; top: 0; bottom: 0; left: 50%; width: 3px; background: var(--gold); z-index: 10; transform: translateX(-50%); }
    .ba-handle {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 44px; height: 44px; border-radius: 50%; background: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 900; color: var(--navy);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 11; pointer-events: none;
    }
    .ba-labels { display: flex; justify-content: space-between; margin-top: 0.6rem; padding: 0 0.5rem; }
    .ba-labels span { font-size: 0.8rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; opacity: 0.75; }
    .ba-labels .lbl-antes { color: #ff6b6b; }
    .ba-labels .lbl-depois { color: #6bffb8; }

    .hours { background: #060e1c; padding: 4rem 1.5rem; text-align: center; }
    .hours .section-title { color: var(--white); }
    .hours-box { display: inline-flex; align-items: center; gap: 1.2rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 1.6rem 3rem; margin-top: 0.5rem; }
    .hours-box .clock { font-size: 2.5rem; }
    .hours-box p { font-size: 1.15rem; font-weight: 700; }
    .hours-box span { color: var(--gold); font-weight: 800; }

    .contact { background: linear-gradient(135deg, var(--red) 0%, #8b0e12 100%); padding: 5rem 1.5rem; text-align: center; }
    .contact .section-title { color: var(--white); }
    .contact .section-label { color: rgba(255,255,255,0.75); }
    .contact-card { display: inline-flex; flex-direction: column; align-items: center; gap: 1.5rem; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; padding: 2.5rem 3rem; margin-top: 1rem; }
    .contact-card p { font-size: 1rem; font-weight: 600; opacity: 0.85; }
    .wa-btn { display: inline-flex; align-items: center; gap: 0.7rem; background: #fff; color: var(--red); font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 800; text-decoration: none; padding: 0.9rem 2rem; border-radius: 50px; transition: transform 0.2s, box-shadow 0.2s; }
    .wa-btn:hover { transform: scale(1.04); box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
    .wa-btn svg { width: 22px; height: 22px; fill: #25d366; }

    footer { background: #060e1c; text-align: center; padding: 1.8rem 1rem; font-size: 0.8rem; color: rgba(255,255,255,0.3); }

    .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
